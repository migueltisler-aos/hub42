          - paragraph [ref=e209]: During the challenging days of the COVID pandemic, as a new mom, I found it difficult to carve out moments of self-care. This inspired me to create Frühling94—a brand dedicated to gifting women 15 minutes of cherished, rejuvenating time for themselves.
        - generic [ref=e211]:
          - img [ref=e212]
          - paragraph [ref=e215]: After a year-long search for the finest ingredients, Frühling94 found the perfect match in Brittany, France—laying the foundation for our premium self-care products.
        - generic [ref=e217]:
          - img [ref=e218]
