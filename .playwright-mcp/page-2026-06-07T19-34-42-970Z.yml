      - list [ref=e131]:
        - listitem [ref=e132]: Entsorgung von Elektro- und Elektronikgeräten
      - paragraph [ref=e133]: Die durchgestrichene Mülltonne bedeutet, dass Sie gesetzlich verpflichtet sind, diese Geräte einer vom unsortierten Siedlungsabfall getrennten Erfassung zuzuführen. Die Entsorgung über die Restmülltonne oder die gelbe Tonne ist untersagt. Enthalten die Produkte Batterien oder Akkus, die nicht fest verbaut sind, müssen diese vor der Entsorgung entnommen und getrennt als Batterie entsorgt werden.
      - list [ref=e134]:
        - listitem [ref=e135]: Möglichkeiten der Rückgabe von Altgeräten
      - paragraph [ref=e136]:
        - text: "Besitzer von Altgeräten können diese im Rahmen der durch öffentlich-rechtlichen Entsorgungsträger eingerichteten und zur Verfügung stehenden Möglichkeiten der Rückgabe oder Sammlung von Altgeräten abgeben, damit eine ordnungsgemäße Entsorgung der Altgeräte sichergestellt ist. Unter dem folgenden Link besteht die Möglichkeit, sich ein Onlineverzeichnis der Sammel- und Rücknahmestellen anzuzeigen zu lassen:"
