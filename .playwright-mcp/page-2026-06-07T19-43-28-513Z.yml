          - paragraph [ref=f112e7]: Datenschutz und Nutzungserlebnis auf VOX.de
          - paragraph [ref=f112e8]:
            - text: Wir und unsere 159
            - link "Partner" [ref=f112e9] [cursor=pointer]:
              - /url: "#"
            - text: verarbeiten und übermitteln personenbezogene Daten (z.B. Identifier und Browserdaten) für die nachfolgend beschriebenen Zwecke. Hierzu werden Cookies und andere Technologien zur Speicherung und zum Zugriff auf Ihrem Gerät eingesetzt. Wir tun dies, um unser Angebot zu verbessern und zu finanzieren. In diesem Zusammenhang können Daten außerhalb des EWR verarbeitet werden und auch Nutzungsprofile gebildet und mit Daten von anderen Angeboten angereichert werden.
          - generic [ref=f112e11]:
            - button "Speichern von oder Zugriff auf Informationen auf einem Endgerät" [ref=f112e13] [cursor=pointer]: Speichern von oder Zugriff auf Informationen auf einem Endgerät
            - button "Personalisierte Werbung und Inhalte, Messung von Werbeleistung und der Performance von Inhalten, Zielgruppenforschung sowie Entwicklung und Verbesserung von Angeboten" [ref=f112e16] [cursor=pointer]: Personalisierte Werbung und Inhalte, Messung von Werbeleistung und der Performance von Inhalten, Zielgruppenforschung sowie Entwicklung und Verbesserung von Angeboten
            - button "Fremdinhalte anzeigen (Soziale Netzwerke und Chat-Systeme)" [ref=f112e19] [cursor=pointer]: Fremdinhalte anzeigen (Soziale Netzwerke und Chat-Systeme)
            - button "Angebotsübergreifende Verarbeitung von Daten durch Bertelsmann-Unternehmen für Analyse, Produktentwicklung, Messung, Werbung und Risikomanagement" [ref=f112e22] [cursor=pointer]: Angebotsübergreifende Verarbeitung von Daten durch Bertelsmann-Unternehmen für Analyse, Produktentwicklung, Messung, Werbung und Risikomanagement
            - button "Erstreckung von Einwilligungen auf Geräte, Apps & Inhalte ohne grafische Benutzerschnittstelle" [ref=f112e25] [cursor=pointer]: Erstreckung von Einwilligungen auf Geräte, Apps & Inhalte ohne grafische Benutzerschnittstelle
        - generic [ref=f112e27]:
