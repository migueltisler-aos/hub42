          - button "Alle akzeptieren" [ref=f112e31] [cursor=pointer]
        - paragraph [ref=f112e33]: Indem Sie „Alle Akzeptieren“ klicken, stimmen Sie (jederzeit widerruflich) diesen Datenverarbeitungen freiwillig zu. Dies umfasst auch Ihre Einwilligung zur Datenverarbeitung außerhalb des EWR (Art. 49 (1) (a) DSGVO, Drittlandtransfer), wo das hohe europäische Datenschutzniveau nicht besteht. Unter „Einstellungen oder ablehnen“ können Sie Ihre Angaben ändern oder Datenverarbeitungen ablehnen. Diese Einstellungen können Sie jederzeit im Privacy Center anpassen.
